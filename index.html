<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Simple popup styling (you can move this to style.css later) */
        .popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 16px;
            border-radius: 4px;
            display: none;
            z-index: 9999;
        }
        .popup.error {
            background: #e53935;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 style="color:red;">NEW DEPLOY TEST 999</h1>
        <h2 id="formTitle">Login</h2>
        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="off" required>
            </div>

            <button type="submit" class="login-btn" id="submitBtn">Login</button>
        </form>

        <p style="margin-top: 12px; font-size: 14px;">
            <span id="toggleText">Don't have an account?</span>
            <button id="toggleModeBtn" style="border:none; background:none; color:#007bff; cursor:pointer; padding:0;">
                Sign up
            </button>
        </p>
    </div>

    <!-- Popup for success/error messages -->
    <div id="popup" class="popup"></div>

    <!-- Firebase SDKs via CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <script>
        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAK_fRdK9-iPVKm2rz439o8wNB_pFeeAsA",
            authDomain: "medisync-ai-110c3.firebaseapp.com",
            databaseURL: "https://medisync-ai-110c3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "medisync-ai-110c3",
            storageBucket: "medisync-ai-110c3.firebasestorage.app",
            messagingSenderId: "543790245122",
            appId: "1:543790245122:web:c51b40046e8e788c750e1b",
            measurementId: "G-DD0T54M0JV"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        firebase.analytics();

        const auth = firebase.auth();
        const db = firebase.database();

        // Small helper: popup messages
        function showPopup(message, isError = false) {
            const popup = document.getElementById('popup');
            popup.textContent = message;
            popup.classList.toggle('error', isError);
            popup.style.display = 'block';

            setTimeout(() => {
                popup.style.display = 'none';
            }, 3000);
        }

        // Toggle between Login and Signup modes
        let isLoginMode = true;
        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const toggleModeBtn = document.getElementById('toggleModeBtn');

        toggleModeBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                formTitle.textContent = 'Login';
                submitBtn.textContent = 'Login';
                toggleText.textContent = "Don't have an account?";
                toggleModeBtn.textContent = 'Sign up';
            } else {
                formTitle.textContent = 'Sign Up';
                submitBtn.textContent = 'Sign Up';
                toggleText.textContent = 'Already have an account?';
                toggleModeBtn.textContent = 'Login';
            }
        });

        // Handle form submit
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !username || !password) {
                showPopup('Please fill all fields', true);
                return;
            }

            if (isLoginMode) {
                // LOGIN FLOW
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        const user = userCredential.user;

                        // Save username locally for greeting on dashboard
                        localStorage.setItem('medisync_username', username);
                        localStorage.setItem('medisync_email', email);
                        localStorage.setItem('medisync_uid', user.uid);

                        showPopup('Login successful!');
                        // Redirect after short delay so user sees popup
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    })
                    .catch((error) => {
                        console.error(error);
                        showPopup(error.message || 'Login failed', true);
                    });
            } else {
                // SIGNUP FLOW
                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        const user = userCredential.user;

                        // Save user data to Realtime Database (users node)
                        db.ref('users/' + user.uid).set({
                            email: email,
                            username: username,
                            createdAt: new Date().toISOString()
                        });

                        // Save username locally for greeting on dashboard
                        localStorage.setItem('medisync_username', username);
                        localStorage.setItem('medisync_email', email);
                        localStorage.setItem('medisync_uid', user.uid);

                        showPopup('Signup successful! Welcome, ' + username);
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    })
                    .catch((error) => {
                        console.error(error);
                        showPopup(error.message || 'Signup failed', true);
                    });
            }
        });
    </script>
</body>
</html>
