<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Reminders – MediSync AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #111827 0, #020617 45%, #000 100%);
            color: #e5e7eb;
            margin: 0;
            padding: 0;
        }
        .reminder-page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 12px;
        }
        .reminder-card {
            width: 100%;
            max-width: 640px;
            background: rgba(15, 23, 42, 0.96);
            border-radius: 20px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.4);
            padding: 20px 22px;
        }
        .reminder-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 16px;
            gap: 10px;
        }
        .reminder-icon {
            width: 42px;
            height: 42px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #22c55e, #16a34a);
            font-size: 22px;
            color: #0b1120;
            flex-shrink: 0;
        }
        .reminder-title-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .reminder-title {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: #f9fafb;
        }
        .reminder-subtitle {
            margin: 0;
            font-size: 13px;
            color: #9ca3af;
        }
        .reminder-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 16px;
            margin-top: 14px;
            margin-bottom: 18px;
        }
        .reminder-form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .reminder-form-group.full-width {
            grid-column: 1 / -1;
        }
        .reminder-label {
            font-size: 13px;
            font-weight: 500;
            color: #d1d5db;
        }
        .reminder-input,
        .reminder-select,
        .reminder-textarea {
            width: 100%;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            background: rgba(15, 23, 42, 0.96);
            color: #f9fafb;
            font-size: 13px;
            outline: none;
        }
        .reminder-input::placeholder,
        .reminder-textarea::placeholder {
            color: #6b7280;
        }
        .reminder-textarea {
            resize: vertical;
            min-height: 60px;
        }
        .reminder-sound-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .reminder-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
        }
        .reminder-btn {
            padding: 9px 18px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(to right, #22c55e, #16a34a);
            color: #0b1120;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .reminder-btn span.icon {
            font-size: 14px;
        }
        .test-sound-btn {
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.6);
            background: transparent;
            color: #e5e7eb;
            font-size: 12px;
            cursor: pointer;
        }
        .reminder-list-title {
            font-size: 14px;
            font-weight: 500;
            margin: 8px 0 6px;
            color: #d1d5db;
        }
        .reminder-list {
            max-height: 260px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid rgba(55, 65, 81, 0.7);
            background: rgba(15, 23, 42, 0.92);
        }
        .reminder-item {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(55, 65, 81, 0.7);
        }
        .reminder-item:last-child {
            border-bottom: none;
        }
        .reminder-name {
            font-size: 14px;
            font-weight: 600;
            color: #e5e7eb;
        }
        .reminder-meta {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }
        .reminder-note {
            font-size: 12px;
            color: #d1d5db;
            margin-top: 4px;
        }
        .popup {
            position: fixed;
            top: 16px;
            right: 16px;
            background: #16a34a;
            color: white;
            padding: 10px 16px;
            border-radius: 999px;
            display: none;
            z-index: 9999;
            font-size: 13px;
        }
        .popup.error {
            background: #dc2626;
        }
        @media (max-width: 640px) {
            .reminder-card {
                padding: 18px 14px;
                border-radius: 16px;
            }
            .reminder-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="reminder-page-wrapper">
        <div class="reminder-card">
            <div class="reminder-header">
                <div class="reminder-icon">⏰</div>
                <div class="reminder-title-block">
                    <h2 class="reminder-title">Health Reminders</h2>
                    <p class="reminder-subtitle">Stay on track with medicines, water, fruits, and your daily wellness routine.</p>
                </div>
            </div>

            <form id="reminderForm" class="reminder-form">
                <div class="reminder-form-group full-width">
                    <label class="reminder-label" for="reminderName">Reminder name</label>
                    <input class="reminder-input" type="text" id="reminderName" placeholder="e.g., Paracetamol, Drink Water, Eat Dry Fruits" required>
                </div>
                <div class="reminder-form-group">
                    <label class="reminder-label" for="reminderDate">Date</label>
                    <input class="reminder-input" type="date" id="reminderDate" required>
                </div>
                <div class="reminder-form-group">
                    <label class="reminder-label" for="reminderTime">Time</label>
                    <input class="reminder-input" type="time" id="reminderTime" required>
                    <small style="font-size:11px; color:#9ca3af;">Enter time; it will show as AM / PM in your reminders list.</small>
                </div>
                <div class="reminder-form-group full-width">
                    <label class="reminder-label" for="reminderNote">Note (optional)</label>
                    <textarea class="reminder-textarea" id="reminderNote" rows="2" placeholder="e.g., Take after lunch with water"></textarea>
                </div>
                <div class="reminder-form-group full-width">
                    <label class="reminder-label" for="reminderSound">Reminder sound</label>
                    <div class="reminder-sound-row">
                        <select class="reminder-select" id="reminderSound">
                            <option value="chime">Soft chime (default)</option>
                            <option value="alert">Alert beep</option>
                            <option value="bell">Bell ring</option>
                            <option value="soft1">Soft melody 1</option>
                            <option value="soft2">Soft melody 2</option>
                            <option value="soft3">Soft melody 3</option>
                            <option value="calm1">Calm ambient 1</option>
                            <option value="calm2">Calm ambient 2</option>
                            <option value="focus">Focus tone</option>
                            <option value="strong">Strong alarm</option>
                        </select>
                        <button type="button" id="testSoundBtn" class="test-sound-btn">Test sound</button>
                    </div>
                </div>
                <div class="reminder-actions full-width">
                    <button type="submit" class="reminder-btn">
                        <span class="icon">＋</span>
                        Save reminder
                    </button>
                </div>
            </form>

            <h3 class="reminder-list-title">Your upcoming reminders</h3>
            <div id="reminderList" class="reminder-list">
                <!-- Reminders will be loaded here -->
            </div>
        </div>
    </div>

    <div id="reminderPopup" class="popup"></div>

    <!-- Audio elements for sounds (10 variations) -->
    <audio id="sound-chime" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>
    <audio id="sound-alert" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
    <audio id="sound-bell" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>
    <audio id="sound-soft1" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg" preload="auto"></audio>
    <audio id="sound-soft2" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>
    <audio id="sound-soft3" src="https://actions.google.com/sounds/v1/cartoon/slide_whistle.ogg" preload="auto"></audio>
    <audio id="sound-calm1" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg" preload="auto"></audio>
    <audio id="sound-calm2" src="https://actions.google.com/sounds/v1/alarms/daniel_simon_alien_alarm.ogg" preload="auto"></audio>
    <audio id="sound-focus" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
    <audio id="sound-strong" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>

</body>
